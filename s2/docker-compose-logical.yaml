services:

  publisher:
    image: postgres:17
    container_name: pg_publisher
    environment:
      POSTGRES_DB: flytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata_publisher:/var/lib/postgresql/data
      - ./db/init/init-replication.sql:/docker-entrypoint-initdb.d/01-init-replication.sql
      - ./db/init/init-hba.sh:/docker-entrypoint-initdb.d/02-init-hba.sh
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "listen_addresses=*"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flytics"]
      interval: 5s
      timeout: 5s
      retries: 10

  flyway:
    image: flyway/flyway
    container_name: pg_flyway_logical
    depends_on:
      publisher:
        condition: service_healthy
    command:
      - "migrate"
      - "-baselineOnMigrate=true"
      - "-connectRetries=60"
    volumes:
      - ./db/migrations:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://publisher:5432/flytics
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
      FLYWAY_BASELINE_VERSION: 1
      FLYWAY_BASELINE_DESCRIPTION: Initial baseline
      FLYWAY_SCHEMAS: public

  subscriber:
    image: postgres:17
    container_name: pg_subscriber
    environment:
      POSTGRES_DB: flytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - pgdata_subscriber:/var/lib/postgresql/data
    depends_on:
      publisher:
        condition: service_healthy

volumes:
  pgdata_publisher:
  pgdata_subscriber:
