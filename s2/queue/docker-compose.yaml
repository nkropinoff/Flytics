services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: flight_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d flight_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  producer:
    build: .
    environment:
      - SPRING_PROFILES_ACTIVE=producer
      - DB_URL=jdbc:postgresql://postgres:5432/flight_db
      - DB_USER=root
      - DB_PASS=root
    depends_on:
      postgres:
        condition: service_healthy

  consumer-1:
    build: .
    environment:
      - SPRING_PROFILES_ACTIVE=consumer
      - DB_URL=jdbc:postgresql://postgres:5432/flight_db
      - DB_USER=root
      - DB_PASS=root
    depends_on:
      postgres:
        condition: service_healthy
      producer:
        condition: service_started

  consumer-2:
    build: .
    environment:
      - SPRING_PROFILES_ACTIVE=consumer
      - DB_URL=jdbc:postgresql://postgres:5432/flight_db
      - DB_USER=root
      - DB_PASS=root
    depends_on:
      postgres:
        condition: service_healthy
      producer:
        condition: service_started