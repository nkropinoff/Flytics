services:

  primary:
    image: postgres:17
    container_name: pg_primary
    environment:
      POSTGRES_DB: flytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata_primary:/var/lib/postgresql/data
      - ./db/init/init-replication.sql:/docker-entrypoint-initdb.d/01-init-replication.sql
      - ./db/init/init-hba.sh:/docker-entrypoint-initdb.d/02-init-hba.sh
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "listen_addresses=*"
      - "-c"
      - "wal_keep_size=256"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flytics"]
      interval: 5s
      timeout: 5s
      retries: 10

  flyway:
    image: flyway/flyway
    container_name: pg_flyway
    depends_on:
      primary:
        condition: service_healthy
    command:
      - "migrate"
      - "-baselineOnMigrate=true"
      - "-connectRetries=60"
    volumes:
      - ./db/migrations:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://primary:5432/flytics
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
      FLYWAY_BASELINE_VERSION: 1
      FLYWAY_BASELINE_DESCRIPTION: Initial baseline
      FLYWAY_SCHEMAS: public

  replica1:
    image: postgres:17
    container_name: pg_replica1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata_replica1:/var/lib/postgresql/data
      - ./db/init/replica-init.sh:/replica-init.sh
    depends_on:
      primary:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/replica-init.sh"]

  replica2:
    image: postgres:17
    container_name: pg_replica2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - pgdata_replica2:/var/lib/postgresql/data
      - ./db/init/replica-init.sh:/replica-init.sh
    depends_on:
      primary:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/replica-init.sh"]

volumes:
  pgdata_primary:
  pgdata_replica1:
  pgdata_replica2:
